{% extends "base.html" %}

{% block title %}
Delete Photo
{% endblock %}


{% block content %}


<div class="container py-5">


<div class="card shadow">


<div class="card-body text-center">


<h3>
Delete "{{ photo.title }}"?
</h3>


<p class="text-muted">

This action cannot be undone.

</p>



<form method="POST">

{% csrf_token %}


<button class="btn btn-danger">

Yes, Delete

</button>


<a href="{% url 'index' %}"
class="btn btn-secondary">

Cancel

</a>


</form>


</div>


</div>


</div>


{% endblock %}
