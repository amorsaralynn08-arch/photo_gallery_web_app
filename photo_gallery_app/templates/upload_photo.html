{% extends "base.html" %}

{% block title %}Upload Photo{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">

                    <h3 class="mb-0">
                        Upload a Photo
                    </h3>

                </div>


                <div class="card-body">


                    <form method="POST" enctype="multipart/form-data">

                        {% csrf_token %}


                        <div class="mb-3">

                            <label class="form-label">
                                Photo Title
                            </label>

                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                placeholder="Enter photo title">

                        </div>



                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                name="description"
                                class="form-control"
                                rows="5"
                                placeholder="Tell us about your photo..."></textarea>

                        </div>




                        <div class="mb-3">

                            <label class="form-label">
                                Tags
                            </label>


                            <select
                                name="tags"
                                class="form-select"
                                multiple>


                                {% for tag in form.fields.tags.queryset %}

                                <option value="{{ tag.id }}">

                                    {{ tag.name }}

                                </option>


                                {% endfor %}


                            </select>


                            <div class="form-text">

                                Hold CTRL/CMD to select multiple tags.

                            </div>


                        </div>




                        <div class="mb-4">

                            <label class="form-label">
                                Select Image
                            </label>


                            <input
                                type="file"
                                name="image"
                                class="form-control"
                                accept="image/*">


                        </div>




                        <div class="d-grid">


                            <button
                                class="btn btn-success btn-lg"
                                type="submit">

                                Upload Photo

                            </button>


                        </div>


                    </form>


                </div>


            </div>


        </div>


    </div>


</div>


{% endblock %}
